<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="toolbar">
    <span class="brand"><img class="brand-mark" src="assets/icon.png" alt="" /> Bloom</span>
    <div class="spacer"></div>
    <button data-add="todo">+ Todo</button>
    <button data-add="countdown">+ Countdown</button>
    <button data-add="timer">+ Timer</button>
    <button data-add="note">+ Note</button>
    <button id="history-btn" title="Recently closed cards">↺ History</button>
  </header>

  <main id="canvas"></main>
  <div id="history-panel" hidden></div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
